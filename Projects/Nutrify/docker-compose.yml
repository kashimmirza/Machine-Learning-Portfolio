version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nutrify_db
    environment:
      POSTGRES_USER: nutrify_user
      POSTGRES_PASSWORD: nutrify_password
      POSTGRES_DB: nutrify_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nutrify_network

  minio:
    image: minio/minio
    container_name: nutrify_minio
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - nutrify_network

volumes:
  postgres_data:
  minio_data:


networks:
  nutrify_network:
    driver: bridge
