name: frontend
description: "Production-ready Agentic Medical AI System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animations
  google_fonts: ^3.0.1
  animate_do: ^3.0.0
  flutter_markdown: ^0.6.10
  
  # State & Architecture
  provider: ^6.0.0
  
  # Networking
  dio: ^5.0.0
  
  # Hardware & Files
  camera: ^0.10.0
  image_picker: ^0.8.7
  path_provider: ^2.0.11
  
  # Utility
  uuid: ^3.0.7
  intl: ^0.18.0
  flutter_riverpod: ^2.3.7
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
